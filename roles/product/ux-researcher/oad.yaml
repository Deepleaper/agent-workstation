apiVersion: opc/v1
kind: Agent
metadata:
  name: ux-researcher
  version: 1.0.0
  description: "AI UX Researcher"
  author: "Deepleaper Community"
  license: Apache-2.0
  marketplace:
    category: product
    tags: [product, ux, researcher]
spec:
  provider:
    default: deepseek
    allowed: [openai, deepseek, qwen, claude]
  model: deepseek-chat
  systemPrompt: "@prompts/system.md"
  skills:
    - name: user-interview
      description: "user interview"
    - name: usability-testing
      description: "usability testing"
    - name: survey-design
      description: "survey design"
    - name: insight-synthesis
      description: "insight synthesis"
  channels:
    - type: web
      port: 3000
  memory:
    shortTerm: true
    longTerm:
      provider: deepbrain
  dtv:
    trust:
      level: sandbox
    value:
      metrics: [research_quality, actionable_insights, participant_satisfaction]
