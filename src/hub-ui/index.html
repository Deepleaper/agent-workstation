<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workstation Hub — Agent Template Marketplace</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--bg-card:#141414;--bg-hover:#1a1a1a;--accent:#3b82f6;--accent-hover:#2563eb;--text:#e5e5e5;--text-dim:#888;--border:#222;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
.container{max-width:1400px;margin:0 auto;padding:0 24px}

/* Header */
.header{padding:32px 0 16px;border-bottom:1px solid var(--border)}
.header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px}
.header h1 span{color:var(--accent)}
.header p{color:var(--text-dim);margin-top:4px;font-size:14px}

/* Stats bar */
.stats{display:flex;gap:24px;padding:16px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text-dim)}
.stats .stat{display:flex;align-items:center;gap:6px}
.stats .stat strong{color:var(--text);font-size:16px}

/* Search */
.search-wrap{padding:24px 0;position:relative}
.search-wrap input{width:100%;padding:14px 20px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:16px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:#555}

/* Layout */
.main{display:flex;gap:24px;padding:24px 0}
.sidebar{width:260px;flex-shrink:0}
.content{flex:1;min-width:0}

/* Industry cards */
.industry-list{display:flex;flex-direction:column;gap:8px}
.industry-card{padding:12px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center}
.industry-card:hover,.industry-card.active{border-color:var(--accent);background:var(--bg-hover)}
.industry-card .name{font-size:14px;text-transform:capitalize}
.industry-card .count{font-size:12px;color:var(--text-dim);background:#1e1e1e;padding:2px 8px;border-radius:10px}

/* Role grid */
.role-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.role-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .2s}
.role-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.role-card .badge{display:inline-block;font-size:11px;color:var(--accent);background:rgba(59,130,246,0.1);padding:2px 10px;border-radius:20px;margin-bottom:8px;text-transform:capitalize}
.role-card h3{font-size:16px;margin-bottom:4px}
.role-card .title-cn{font-size:13px;color:var(--text-dim);margin-bottom:8px}
.role-card .desc{font-size:13px;color:#999;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.role-card .tags{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
.role-card .tag{font-size:11px;color:#666;background:#1a1a1a;padding:2px 8px;border-radius:4px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;width:90%;max-width:800px;max-height:90vh;overflow-y:auto;padding:32px}
.modal h2{font-size:24px;margin-bottom:4px}
.modal .meta{color:var(--text-dim);font-size:14px;margin-bottom:20px}
.modal .section{margin-bottom:24px}
.modal .section h4{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:8px}
.modal .section pre{background:#0d0d0d;border:1px solid var(--border);border-radius:8px;padding:16px;font-size:13px;line-height:1.6;white-space:pre-wrap;max-height:300px;overflow-y:auto;color:#ccc}
.modal .actions{display:flex;gap:12px;margin-top:24px}
.modal .btn{padding:12px 24px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.modal .btn-primary{background:var(--accent);color:#fff}
.modal .btn-primary:hover{background:var(--accent-hover)}
.modal .btn-secondary{background:#222;color:var(--text)}
.modal .btn-secondary:hover{background:#333}
.close-btn{position:absolute;top:16px;right:16px;background:none;border:none;color:#666;font-size:24px;cursor:pointer}

/* Responsive */
@media(max-width:768px){
  .main{flex-direction:column}
  .sidebar{width:100%}
  .industry-list{flex-direction:row;flex-wrap:wrap}
  .industry-card{flex:1;min-width:120px}
  .role-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🏢 Workstation <span>Hub</span></h1>
    <p>Agent Template Marketplace — Browse, search, and export AI agent role templates</p>
  </div>
  <div class="stats" id="stats"></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search roles... (e.g. 'backend developer', '产品经理', 'data analyst')">
  </div>
  <div class="main">
    <aside class="sidebar">
      <div class="industry-list" id="industryList"></div>
    </aside>
    <section class="content">
      <div class="role-grid" id="roleGrid"></div>
    </section>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal" style="position:relative">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2 id="modalTitle"></h2>
    <div class="meta" id="modalMeta"></div>
    <div id="modalBody"></div>
    <div class="actions">
      <button class="btn btn-primary" id="modalExport">📦 Export as Agent</button>
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
const API = '';
let allRoles = [];
let industries = [];
let activeIndustry = null;
let searchTimeout = null;

async function init() {
  const [indRes, popRes] = await Promise.all([
    fetch(`${API}/api/hub/industries`).then(r=>r.json()),
    fetch(`${API}/api/hub/popular?limit=100`).then(r=>r.json())
  ]);
  industries = indRes;
  allRoles = popRes;

  const totalRoles = industries.reduce((s,i)=>s+i.roleCount,0);
  document.getElementById('stats').innerHTML =
    `<div class="stat"><strong>${totalRoles}</strong> roles</div>` +
    `<div class="stat">•</div>` +
    `<div class="stat"><strong>${industries.length}</strong> industries</div>` +
    `<div class="stat">•</div>` +
    `<div class="stat"><strong>3</strong> tiers of knowledge</div>`;

  renderIndustries();
  renderRoles(allRoles);
}

function renderIndustries() {
  const el = document.getElementById('industryList');
  el.innerHTML = `<div class="industry-card ${!activeIndustry?'active':''}" onclick="filterIndustry(null)">
    <span class="name">All</span><span class="count">${industries.reduce((s,i)=>s+i.roleCount,0)}</span>
  </div>` + industries.map(i => `<div class="industry-card ${activeIndustry===i.id?'active':''}" onclick="filterIndustry('${i.id}')">
    <span class="name">${i.name}</span><span class="count">${i.roleCount}</span>
  </div>`).join('');
}

function renderRoles(roles) {
  document.getElementById('roleGrid').innerHTML = roles.length === 0
    ? '<p style="color:#666;padding:40px;text-align:center">No roles found</p>'
    : roles.map(r => `<div class="role-card" onclick="showRole('${r.id}')">
    <span class="badge">${r.category||r.industry}</span>
    <h3>${esc(r.title)}</h3>
    ${r.titleCN ? `<div class="title-cn">${esc(r.titleCN)}</div>` : ''}
    <div class="desc">${esc(r.description)}</div>
    <div class="tags">${(r.tags||[]).slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
  </div>`).join('');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function filterIndustry(id) {
  activeIndustry = id;
  renderIndustries();
  const q = document.getElementById('searchInput').value;
  await doSearch(q);
}

async function doSearch(q) {
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (activeIndustry) params.set('industry', activeIndustry);
  const res = await fetch(`${API}/api/hub/search?${params}`).then(r=>r.json());
  renderRoles(res);
}

document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => doSearch(e.target.value), 200);
});

async function showRole(id) {
  const r = await fetch(`${API}/api/hub/roles/${id}`).then(r=>r.json());
  if (r.error) return alert(r.error);
  document.getElementById('modalTitle').textContent = `${r.title} ${r.titleCN||''}`;
  document.getElementById('modalMeta').textContent = `${r.category} • ${r.tags?.join(', ')||''}`;
  document.getElementById('modalBody').innerHTML = `
    <div class="section"><h4>Description</h4><p style="color:#ccc;line-height:1.6">${esc(r.description)}</p></div>
    ${r.brainSeed ? `<div class="section"><h4>🧠 Brain Seed (Job Knowledge)</h4><pre>${esc(r.brainSeed.slice(0,2000))}</pre></div>` : ''}
    ${r.workstationSeed ? `<div class="section"><h4>🖥️ Workstation Seed</h4><pre>${esc(r.workstationSeed.slice(0,2000))}</pre></div>` : ''}
    ${r.industrySeed ? `<div class="section"><h4>🏭 Industry Seed</h4><pre>${esc(r.industrySeed.slice(0,2000))}</pre></div>` : ''}
    ${r.ratingCount ? `<div class="section"><h4>Rating</h4><p style="color:#ccc">⭐ ${r.rating?.toFixed(1)} (${r.ratingCount} ratings)</p></div>` : ''}
  `;
  document.getElementById('modalExport').onclick = () => exportRole(id);
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });

async function exportRole(id) {
  try {
    const res = await fetch(`${API}/api/hub/roles/${id}/export`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({}) });
    const data = await res.json();
    if (data.ok) alert(`Exported to: ${data.path}`);
    else alert(`Error: ${data.error}`);
  } catch(e) { alert(`Export failed: ${e.message}`); }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
init();
</script>
</body>
</html>
